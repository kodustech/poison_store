name: poison_store_app
description: A Flutter module for the poison store application.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  http: ^1.1.0
  intl: ^0.18.1

  google_maps_flutter:
    git:
      url: https://github.com/quintoandar/flutter-packages.git
      ref: google_maps_flutter-v2.6.0-fork.4
      path: packages/google_maps_flutter/google_maps_flutter
  google_maps_flutter_android:
    git:
      url: https://github.com/quintoandar/flutter-packages.git
      ref: google_maps_flutter_android-v2.6.0-fork.4
      path: packages/google_maps_flutter/google_maps_flutter_android
  google_maps_flutter_platform_interface:
    git:
      url: https://github.com/quintoandar/flutter-packages.git
      ref: google_maps_flutter_platform_interface-v2.6.0-fork.2
      path: packages/google_maps_flutter/google_maps_flutter_platform_interface

  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
