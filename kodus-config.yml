reviewOptions:
  security: false
  cross_file: true
  performance: false
  business_logic: false
  bug: true
suggestionControl:
  maxSuggestions: 20
  severityLevelFilter: low
  applyFiltersToKodyRules: false
v2PromptOverrides:
  level:
    issue: >
      The code produces WRONG results, crashes, loses data, or silently fails to
      perform its intended function in at least one scenario.
    critical: >
      The code WILL crash, lose/corrupt data, or open a severe security breach
      in production. Immediate fix required before merge.
    warning: >
      The code produces CORRECT results and performs its intended function in
      ALL scenarios but is suboptimal in style, performance, or maintainability.
  categories:
    descriptions:
      bug: >-
        {"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"-
        Execution breaks: Code throws unhandled exceptions\n- Wrong results:
        Output doesn't match expected behavior\n- Resource leaks: Unclosed
        files, connections, memory accumulation\n- State corruption: Invalid
        object/data states\n- Logic errors: Control flow produces incorrect
        outcomes\n- Race conditions: Concurrent access causes inconsistent state
        or duplicates\n- Incorrect measurements: Metrics/timings that don't
        reflect actual operations\n- Invariant violations: Broken constraints
        (size limits, uniqueness, etc.)\n- Async timing bugs: Variables captured
        incorrectly in async closures\n- Conditional validation errors: Logic
        that checks for presence/absence of values using truthiness tests (e.g.,
        `if dict.get(\"key\")`) that fail with falsy values (0, None, False,
        \"\"), when membership tests (e.g., `if \"key\" in dict`) should be
        used\n- Dead computation: Code that computes/transforms values but never
        uses the result, instead using the original untransformed value -
        indicates copy-paste error or incomplete refactoring\n- Unbounded
        growth: Collections (lists, dicts, sets) that grow indefinitely within
        loops without size limits, potentially causing memory exhaustion\n-
        Duplicate operations: Same operation executed multiple times with
        identical inputs in sequence, wasting resources and potentially causing
        incorrect counts/metrics\n"}]}]}
      security: >-
        {"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"-
        Injection vulnerabilities: SQL/NoSQL/command/LDAP injection\n-
        AuthZ/AuthN flaws: Missing checks, privilege escalation\n- Data
        exposure: Sensitive data in logs, responses, or errors\n- Crypto issues:
        Weak algorithms, hardcoded keys, improper validation\n- Input validation
        gaps: Missing sanitization or bounds checks\n- Session management:
        Predictable tokens or missing expiration\n- Timing attacks: Direct
        string/value comparison of secrets, tokens, passwords, or authentication
        credentials that leaks information through execution time - must use
        constant-time comparison functions\n- Insecure fallback values: Using
        empty strings, default values, or weak fallbacks for critical security
        parameters (encryption keys, secrets, tokens) when environment variables
        are missing - system should fail-fast instead\n- Input validation
        bypass: User-controlled parameters (offsets, limits, indices, IDs)
        accepted without validation or with inadequate bounds checking,
        especially negative values in array slicing or pagination that could
        bypass access controls\n- SSRF (Server-Side Request Forgery): Using
        user-controlled URLs in network operations (open, fetch, HTTP requests)
        without allowlist validation, enabling access to internal resources or
        arbitrary external sites\n- Case-sensitivity bypass: Inconsistent
        normalization in comparisons of case-insensitive data (emails,
        usernames, domains) where one side is normalized
        (toLowerCase/toUpperCase) but the other isn't, allowing bypass through
        case variations\n"}]}]}
      performance: >-
        {"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"-
        Algorithm complexity: O(n²) when O(n) is possible\n- Redundant
        operations: Duplicate calculations, unnecessary loops, or early returns
        that force multiple operations when a single operation would suffice
        (e.g., fail-fast in batch processing that requires multiple requests to
        get complete feedback)\n- Memory waste: Large allocations or leaks over
        time\n- Blocking operations: Synchronous I/O in critical paths\n-
        Database inefficiency: N+1, missing indexes, full scans\n- Cache misses:
        Not leveraging available caching mechanisms\n- Batch processing
        inefficiency: Validation or processing loops that return on first error
        instead of collecting all errors, forcing clients to make multiple
        requests to discover all issues\n"}]}]}
  generation:
    main: >-
      {"type":"doc","content":[{"type":"paragraph","content":[{"type":"text","text":"Detailed
      and verifiable issue description\n- **No conversational filler**: Avoid
      phrases like \"I noticed that,\" \"It seems like,\" or \"You should
      consider.\"\n- **Execute \"Brevity First\"**: Eliminate all introductory
      pleasantries. Start descriptions with the noun of the error (e.g.,
      \"Memory leak,\" \"Null pointer dereference,\" \"Timing attack\").\n-
      **Direct addressing**: State the problem immediately, followed by the
      technical cause.\n- **Strictly technical**: Use only domain-specific
      terminology. If a bug is a race condition, start with \"Race condition
      identified in...\"\n- **Use Active Voice**: \"The function leaks memory\"
      instead of \"Memory is leaked by the function.\"\n- **Sentence cap**:
      Limit the description to 1-2 high-impact sentences.\n"}]}]}
  severity:
    flags:
      critical: |
        Application crash/downtime
        Data loss/corruption or state corruption under concurrent access
        Security breach (unauthorized access/data exfiltration)
        Critical operation failure (auth/payment/authorization)
        Direct financial loss operations
        Memory leaks that inevitably crash production
        Race conditions causing data loss or security bypass
      high: >
        Important functionality broken or silently wrong

        Race conditions, TOCTOU bugs, missing synchronization

        Missing or incorrect locking (e.g., double-checked locking, lock scope
        reduction)

        Cache inconsistency or stale data served to users

        Feature flags or configuration that silently disables functionality

        Memory leaks that cause eventual crash

        Performance degradation affecting UX under normal load

        Security issues with indirect exploitation paths

        Functions that always return wrong values (logic errors)
      medium: |
        Partially broken functionality with workarounds available
        Performance issues in specific scenarios only
        Security weaknesses requiring specific conditions to exploit
        Incorrect but recoverable data
        Non-critical business logic errors
      low: |
        Minor performance overhead
        Low-risk security improvements
        Incorrect metrics/logs
        Rarely affecting few users
        Edge-case issues unlikely to occur in practice
automatedReviewActive: false
pullRequestApprovalActive: true
enableCommittableSuggestions: false
ignorePaths:
  - yarn.lock
  - package-lock.json
  - package.json
  - .env
  - '**/*.json'
ignoredTitleKeywords: []
baseBranches: []
showStatusFeedback: true
summary:
  customInstructions: ''
  behaviourForExistingDescription: replace
  behaviourForNewCommits: none
kodusConfigFileOverridesWebPreferences: false
isRequestChangesActive: false
ideRulesSyncEnabled: false
kodyRulesGeneratorEnabled: true
llmGeneratedMemoriesRequireApproval: false
reviewCadence:
  type: automatic
  timeWindow: 15
  pushesToTrigger: 3
runOnDraft: true
codeReviewVersion: v2
byokModel: ''
customMessages:
  startReviewMessage:
    content: >
      # PR Summary - v5


      ## Code Review Started! 🚀


      ✋ Hi, team! I'm already looking at the changed files and starting the
      review to ensure everything is in order. If you need more details, I'm
      here! [Kody](https://kodus.io)


      @reviewCadence


      @changedFiles


      @changeSummary
  endReviewMessage:
    content: >
      # PR Summary - v5


      ## Code Review Completed! 🔥


      The code review was successfully completed based on your current
      configurations.




      <details>

      <summary>Kody Guide: Usage and Configuration</summary>


      <details>

      <summary>Interacting with Kody</summary>


      - **Request a Review:** Ask Kody to review your PR manually by adding a
      comment with the \`@kody start-review\` command at the root of your PR.


      - **Provide Feedback:** Help Kody learn and improve by reacting to its
      comments with a 👍 for helpful suggestions or a 👎 if improvements are
      needed.


      </details>


      <details>

      <summary>Providing Context (Files & MCPs)</summary>


      Add these hints in your PR description (or a comment) to unlock deeper
      checks:


      - **Ticket / Acceptance Criteria:** \`Refs: ABC-123\`
      (Linear/Jira/Asana/ClickUp/Trello) or a direct ticket link.

      - **Bugfix Validation:** a Sentry/Datadog/Bugsnag event link (or paste the
      stack trace/error message).

      - **Endpoint Risk:** mention the route (e.g., \`POST /api/payments\`) or
      controller/action name.

      - **Attach a repo file as context:** use an explicit marker like
      \`@file:docs/guide.mdx#L10-L50\` (replace with your real path).

      - **API Contract Docs:** include \`@file:openapi.yaml\` or
      \`@file:swagger.json\` when changing routes/schemas.

      - **Definition of Done / Standards:** include \`@file:DOD.md\` or
      \`@file:CONTRIBUTING.md\` if your repo has them.

      - **Design System Source of Truth:** include \`@file:ui/index.ts\`
      (replace with your DS entrypoint path).

      - **Feature Flags:** include the flag key/name and \`@file:flags.ts\` /
      \`@file:config.json\` (and optionally the PostHog flag name).

      - **Edge/CDN Rules:** link the Cloudflare rule/zone or describe the
      intended redirect/header behavior.

      - **Attach an MCP tool output:** use \`@mcp<provider|tool>\` (replace with
      an installed MCP provider + tool, e.g., \`@mcp<sentry|events.search>\`).


      </details>


      <details>

      <summary>Current Kody Configuration</summary>


      @reviewOptions


      </details>


      **[Access your configuration settings
      here.](https://app.kodus.io/settings/code-review/global/general)**


      </details>
